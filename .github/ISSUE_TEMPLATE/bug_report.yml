name: Bug Report
description: Report a bug in Graft
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the details below.
  - type: input
    id: version
    attributes:
      label: Graft Version
      description: Output of `go list -m github.com/delavalom/graft`
      placeholder: v0.2.5
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go Version
      description: Output of `go version`
      placeholder: go1.24.0
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      description: Which LLM provider are you using?
      options:
        - OpenAI
        - Anthropic
        - Google (Gemini)
        - AWS Bedrock
        - OpenRouter
        - Other
        - N/A
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      render: go
    validations:
      required: true
